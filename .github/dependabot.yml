version: 2
updates:
  # Mantiene al día las GitHub Actions de los workflows: abre un PR semanal
  # cuando hay una versión nueva de alguna acción usada.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
