name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  estructura:
    name: Estructura y manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar estructura vs. manifest
        run: python scripts/validar_estructura.py
      - name: Comprobar totales del currículo
        run: python scripts/build.py --stats

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2 "**/*.md"

  equivalencia:
    name: Verificador de equivalencia (núcleo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Instalar sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Verificar equivalencia de todas las clases construidas
        run: python scripts/verificar_equivalencia.py --all
