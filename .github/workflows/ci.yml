name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  estructura:
    name: Estructura y manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar estructura vs. manifest
        run: python scripts/validar_estructura.py
      - name: Comprobar totales del currículo
        run: python scripts/build.py --stats

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2 "**/*.md"

  equivalencia:
    # Un job por lenguaje del núcleo: cada uno compila solo el suyo, en paralelo.
    # Así la verificación de las 176 clases se reparte y termina en minutos.
    name: Equivalencia (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [python, javascript, typescript, java, csharp, go, rust, c, php, sql]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: ${{ matrix.lang == 'javascript' || matrix.lang == 'typescript' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - if: ${{ matrix.lang == 'java' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - if: ${{ matrix.lang == 'csharp' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - if: ${{ matrix.lang == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - if: ${{ matrix.lang == 'php' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - if: ${{ matrix.lang == 'sql' }}
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      # rust (rustc) y c (cc) vienen preinstalados en ubuntu-latest.
      - name: Verificar equivalencia de ${{ matrix.lang }}
        run: python scripts/verificar_equivalencia.py --all --lang ${{ matrix.lang }}
